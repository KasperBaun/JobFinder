appId: dev.kasperbaun.jobfinder
productName: Jobfinder
copyright: © Kasper Baun

directories:
  output: release
  buildResources: build

# What goes inside the app (asar). The 204 MB self-contained backend is NOT here — it rides along
# as extraResources so it stays outside asar and isn't double-packed.
files:
  - dist/**/*
  - package.json

extraResources:
  - from: ../../publish/win-x64
    to: backend
    filter:
      - "**/*"

win:
  target:
    - nsis
  icon: build/icon.ico
  artifactName: jobfinder-setup-${version}.exe
  # Unsigned for now — SmartScreen will warn "unknown publisher". Code-signing is a tracked backlog
  # item; add signtool config here once a cert is available.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Jobfinder
  uninstallDisplayName: Jobfinder
