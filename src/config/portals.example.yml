# Each portal has a `type` that selects the adapter.
# Disable portals by setting `enabled: false` — no code change needed.
#
# `static_fields:` overlays fixed values onto every produced listing
# (title / company / location). Used by per-company ATS boards that
# don't carry the company name in their payload — the board *is* the
# company. Static value wins over the mapped value when non-empty.

portals:
  # ────────────────────────────────────────────────────────────────
  # Greenhouse boards — per-company ATS feeds. Endpoint pattern:
  #   https://boards-api.greenhouse.io/v1/boards/<slug>/jobs?content=true
  # Each board only carries that company's roles, so we stamp the
  # company name via `static_fields:`. The boards below were verified
  # live; if a company moves ATS the slug 404s — flip `enabled: false`
  # and replace, or remove.
  # ────────────────────────────────────────────────────────────────

  - name: greenhouse-pleo
    type: api
    enabled: true
    endpoint: https://boards-api.greenhouse.io/v1/boards/pleo/jobs
    query_params:
      content: "true"
    response_mapping:
      items_path: "jobs"
      id: "id"
      title: "title"
      location: "location.name"
      description: "content"
      url: "absolute_url"
      posted_at: "updated_at"
    static_fields:
      company: "Pleo"
    rate_limit_rps: 1.0

  - name: greenhouse-trustpilot
    type: api
    enabled: true
    endpoint: https://boards-api.greenhouse.io/v1/boards/trustpilot/jobs
    query_params:
      content: "true"
    response_mapping:
      items_path: "jobs"
      id: "id"
      title: "title"
      location: "location.name"
      description: "content"
      url: "absolute_url"
      posted_at: "updated_at"
    static_fields:
      company: "Trustpilot"
    rate_limit_rps: 1.0

  - name: greenhouse-unity
    type: api
    enabled: true
    endpoint: https://boards-api.greenhouse.io/v1/boards/unity3d/jobs
    query_params:
      content: "true"
    response_mapping:
      items_path: "jobs"
      id: "id"
      title: "title"
      location: "location.name"
      description: "content"
      url: "absolute_url"
      posted_at: "updated_at"
    static_fields:
      company: "Unity"
    rate_limit_rps: 1.0

  - name: greenhouse-wolt
    type: api
    enabled: true
    endpoint: https://boards-api.greenhouse.io/v1/boards/wolt/jobs
    query_params:
      content: "true"
    response_mapping:
      items_path: "jobs"
      id: "id"
      title: "title"
      location: "location.name"
      description: "content"
      url: "absolute_url"
      posted_at: "updated_at"
    static_fields:
      company: "Wolt"
    rate_limit_rps: 1.0

  - name: greenhouse-adyen
    type: api
    enabled: true
    endpoint: https://boards-api.greenhouse.io/v1/boards/adyen/jobs
    query_params:
      content: "true"
    response_mapping:
      items_path: "jobs"
      id: "id"
      title: "title"
      location: "location.name"
      description: "content"
      url: "absolute_url"
      posted_at: "updated_at"
    static_fields:
      company: "Adyen"
    rate_limit_rps: 1.0

  # ────────────────────────────────────────────────────────────────
  # Adding more Greenhouse boards: pick a company, find the slug
  # (often the company name lowercased), then verify with:
  #   curl https://boards-api.greenhouse.io/v1/boards/<slug>/jobs
  # If the response is JSON with a "jobs" array, copy a block above,
  # change `name`, `endpoint`, and `static_fields.company`, done.
  #
  # The same pattern works for Lever boards. Lever endpoint shape:
  #   https://api.lever.co/v0/postings/<slug>?mode=json
  # Lever response is a JSON array at the root (no items_path), with
  # mapping: id=id, title=text, location=categories.location,
  # description=descriptionPlain, url=hostedUrl, posted_at=createdAt.
  # Note: Lever's createdAt is epoch milliseconds, which the current
  # ApiAdapter does not parse — postedAt will be null until that lands.
  # ────────────────────────────────────────────────────────────────

  - name: thehub
    type: api
    enabled: true
    endpoint: https://thehub.io/api/jobs
    query_params:
      country_code: DK
      limit: 100
    response_mapping:
      items_path: "docs"
      id: "id"
      title: "title"
      company: "company.name"
      location: "location.address"
      description: "description"
      url: "absoluteJobUrl"
      posted_at: "publishedAt"
    rate_limit_rps: 1.0

  - name: remotive
    type: api
    enabled: true
    endpoint: https://remotive.com/api/remote-jobs
    query_params:
      category: software-dev
    response_mapping:
      items_path: "jobs"
      id: "id"
      title: "title"
      company: "company_name"
      location: "candidate_required_location"
      description: "description"
      url: "url"
      posted_at: "publication_date"
    rate_limit_rps: 1.0

  # ────────────────────────────────────────────────────────────────
  # Disabled by default — flip to `enabled: true` once configured.
  # ────────────────────────────────────────────────────────────────

  - name: adzuna-dk
    type: api
    enabled: false
    endpoint: https://api.adzuna.com/v1/api/jobs/dk/search/1
    query_params:
      app_id: "YOUR_APP_ID"
      app_key: "YOUR_APP_KEY"
      what: "software"
      results_per_page: 50
      content-type: "application/json"
    response_mapping:
      items_path: "results"
      id: "id"
      title: "title"
      company: "company.display_name"
      location: "location.display_name"
      description: "description"
      url: "redirect_url"
      posted_at: "created"
    rate_limit_rps: 1.0
    notes: |
      Adzuna DK — general-purpose Danish job aggregator (free tier).
      Register at https://developer.adzuna.com to get app_id and
      app_key, paste them into query_params above, then flip
      enabled: true. Free tier: ~250 calls/day.

  # jobnet.dk's public-facing search no longer returns JSON for
  # unauthenticated callers — the URL below now serves an HTML page.
  # Real machine integration against STAR (Danish labour-market
  # authority) requires certificate auth and a paid agreement
  # (spoc@star.dk). Left here as a config skeleton; flip to
  # `enabled: true` only if you have a working endpoint.
  - name: jobnet
    type: api
    enabled: false
    endpoint: https://job.jobnet.dk/CV/FindWork/Search
    query_params:
      SearchString: "software engineer"
      Country: Danmark
      Offset: 0
      SortValue: CreationDate
    response_mapping:
      items_path: "JobPositionPostings"
      id: "Id"
      title: "Title"
      company: "HiringOrgName"
      location: "WorkPlaceCity"
      description: "Description"
      url_template: "https://job.jobnet.dk/CV/FindWork/Details/{Id}"
      posted_at: "PostingCreated"
    rate_limit_rps: 2.0

  - name: jobindex
    type: manual
    enabled: false
    notes: |
      jobindex.dk has no public API and automation may violate its ToS.
      To include listings, export or copy results from the browser and drop a
      CSV or JSON file at data/imports/jobindex-*.csv with columns:
      title, company, location, url, description, posted_at.

  - name: linkedin
    type: manual
    enabled: false
    notes: "LinkedIn requires a logged-in session. Use job alerts or a manual export."

  - name: generic-rss-example
    type: rss
    enabled: false
    endpoint: https://example.com/jobs.rss

  - name: html-example
    type: html
    enabled: false
    endpoint: https://example.com/careers
    html:
      list_selector: ".job-card"
      title_selector: ".job-title"
      link_selector: "a.job-link"
      company_selector: ".company"
      location_selector: ".location"
      description_selector: ".summary"
      url_attribute: "href"
    notes: |
      Requires Playwright browsers. The exact install command (with the
      build-output path resolved) is logged when an html portal fails;
      typical shape: `pwsh <bindir>/playwright.ps1 install chromium`.

  # ────────────────────────────────────────────────────────────────
  # T-007 — DK portal research findings (2026-05). All disabled by
  # default. See docs/tasks/T-007/INDEX.md for the per-portal verdicts
  # and full Findings.
  # ────────────────────────────────────────────────────────────────

  - name: jobindex-rss
    type: rss
    enabled: false
    endpoint: https://www.jobindex.dk/jobsoegning.rss
    query_params:
      q: "software engineer"
    rate_limit_rps: 0.5
    notes: |
      Jobindex.dk public RSS feed (undocumented but stable as of 2026-05).
      Returns latest postings; `q=` accepts space-separated keywords matched
      as OR-of-words, not strict phrase. Channel title echoes the filter so
      you can sanity-check what got applied. Items expose title, link
      (e.g. https://www.jobindex.dk/vis-job/h1662717), pubDate, and a short
      description; full body requires fetching the link.
      The same backend powers it-jobbank.dk/jobsoegning.rss and ofir.dk
      (which now 301-redirects to jobindex.dk). Run only one of jobindex /
      it-jobbank as enabled to avoid heavy duplicates — the dedupe layer
      will drop the rest, but you waste calls. Keep rate_limit_rps low;
      this feed is unadvertised and ToS does not bless automation.

  - name: it-jobbank-rss
    type: rss
    enabled: false
    endpoint: https://www.it-jobbank.dk/jobsoegning.rss
    query_params:
      q: "developer"
    rate_limit_rps: 0.5
    notes: |
      IT-jobbank.dk public RSS feed (undocumented but stable as of 2026-05).
      Same Jobindex backend as the `jobindex-rss` block, but pre-scoped to
      IT-only inventory — narrower and tech-denser. `q=` accepts
      space-separated keywords matched as OR-of-words; channel title
      echoes the applied filter for sanity-check. Items expose title,
      link (e.g. https://www.it-jobbank.dk/vis-job/h1662606), pubDate,
      and a short description; full body requires fetching the link.
      Heavy overlap with `jobindex-rss` — enable one or the other, not
      both, unless you want the dedupe layer to drop ~90% of the smaller
      feed. Keep rate_limit_rps low; this feed is unadvertised and ToS
      does not bless automation.

  - name: jobsearch-dk
    type: rss
    enabled: false
    endpoint: https://www.jobsearch.dk/feed/job-annoncer
    rate_limit_rps: 1.0
    notes: |
      Jobsearch.dk — open RSS 2.0 feed, ~100 newest postings, no auth.
      Items expose title / description / link only (no pubDate, no
      company/location fields — those have to be inferred from the
      title or the slug in the URL `/{role}/{city}/{id}`).
      Same backend as Jobzonen.dk (Jobzonen was relaunched on top of
      Jobsearch.dk in 2019). Enable jobsearch-dk *or* jobzonen, not
      both — they produce the same listing pool and would dedupe to
      noise. jobsearch-dk is the canonical pick because the RSS link
      points directly at the source domain.

  - name: careerjet-dk
    type: api
    enabled: false
    endpoint: https://search.api.careerjet.net/v4/query
    query_params:
      affid: "YOUR_AFFID"
      user_ip: "8.8.8.8"
      user_agent: "Mozilla/5.0"
      url: "https://example.com/jobs"
      locale_code: "da_DK"
      keywords: "software"
      location: "Copenhagen"
      sort: "date"
    response_mapping:
      items_path: "jobs"
      id: "url"
      title: "title"
      company: "company"
      location: "locations"
      description: "description"
      url: "url"
      posted_at: "date"
    pagination:
      param: page
      start: 1
      step: 1
      size_param: page_size
      size: 100
      max_pages: 5
    rate_limit_rps: 1.0
    notes: |
      Careerjet DK — Danish coverage of the global Careerjet aggregator
      (free tier). Register at https://www.careerjet.com/partners/api to
      get an affid, paste it into query_params above, then flip
      enabled: true. The user_ip / user_agent / url params are required
      by Careerjet on every request — the placeholder values are fine
      for personal use; substitute your own if you prefer. There is no
      per-job id in the response, so url is used as the dedupe key.
      Pagination is page-based and 1-indexed; max_pages: 5 caps fetches
      at 500 jobs total — bump if you need more coverage.

  - name: jooble
    type: api
    enabled: false
    method: post
    endpoint: https://jooble.org/api/{api_key}
    query_params:
      api_key: "YOUR_API_KEY"
    body_template:
      keywords: "software engineer"
      location: "Denmark"
      radius: 0
      SearchMode: 0
    response_mapping:
      items_path: "jobs"
      id: "id"
      title: "title"
      company: "company"
      location: "location"
      description: "snippet"
      url: "link"
      posted_at: "updated"
    pagination:
      param: page
      start: 1
      step: 1
      size_param: ResultOnPage
      size: 50
      max_pages: 5
    rate_limit_rps: 1.0
    notes: |
      Jooble.org — global aggregator with Danish coverage (free tier).
      Register at https://jooble.org/api/about to obtain an api_key,
      paste it into query_params.api_key (it gets substituted into
      {api_key} in the endpoint path), then flip enabled: true.
      Pagination is page-based and 1-indexed; max_pages: 5 caps fetches
      at 250 jobs total — bump if you need more coverage. The page
      param is injected into body_template per request since this is a
      POST endpoint.
      No published rate limits on the free tier; 1.0 rps is a guess.
      Errors: 403 = bad key, 404 = wrong endpoint.

  - name: recruit-it
    type: html
    enabled: false
    endpoint: https://recruit-it.dk/ledige-stillinger-danmark
    html:
      list_selector: "a:has(> div.ledige-stillinger-box)"
      title_selector: ".ls-title"
      link_selector: ":scope"
      description_selector: ".ls-description"
      url_attribute: "href"
    static_fields:
      company: "Recruit IT (agency)"
    notes: |
      Small Danish IT recruitment agency (~tens of roles). The hiring company
      is embedded in the title (e.g. "IT-chef til 3F") rather than a separate
      field, so the static_fields.company stamps the agency name and downstream
      parsing/ranking should treat the title as authoritative for company.
      Location is rendered as a plain text node next to an icon with no
      wrapper class, so location_selector is intentionally omitted and
      listings will have null location until the markup changes. Requires
      Playwright browsers; the exact install command (with the build-output
      path resolved) is logged when an html portal fails — typical shape:
      `pwsh <bindir>/playwright.ps1 install chromium`.
      Note: link_selector ":scope" relies on Playwright accepting :scope inside
      IElementHandle.QuerySelectorAsync — verify with a smoke test before flipping
      enabled: true. If :scope doesn't resolve, extend HtmlAdapter to read
      url_attribute from the matched list element directly instead of a child.

  - name: stepstone-dk
    type: manual
    enabled: false
    notes: |
      stepstone.dk has no public RSS or consumer-facing API as of 2026-05.
      Despite being in the Jobindex group, the /jobsoegning.rss pattern
      that works on jobindex.dk and it-jobbank.dk returns 404 here.
      api.stepstone.com is a partner job-distribution system (Pull/Push
      Feed for ATS vendors pushing vacancies into Stepstone), not for
      consuming listings, and requires a business contract.
      To include Stepstone.dk listings, export results from the browser
      and drop a CSV/JSON at data/imports/stepstone-*.csv with columns:
      title, company, location, url, description, posted_at.
