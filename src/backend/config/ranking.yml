# Weights must sum to 1.0 (± 0.01). The verifier warns if they don't.
# disqualifier_penalty is applied multiplicatively — 0.0 zeroes the score on any hit.

weights:
  primary_stack: 0.35
  secondary_stack: 0.10
  seniority: 0.15
  location_remote: 0.25
  domain: 0.10
  freshness: 0.05

disqualifier_penalty: 0.0
top_n: 25
freshness_half_life_days: 14
min_score_to_include: 0.25

# Hard filter: drop listings older than this many days (null/absent = no cutoff).
# 180 fits the DK consulting / B2B market where senior roles often stay open
# 60-120 days. The freshness signal still soft-decays older listings via
# `freshness_half_life_days`, so the practical impact of stale-but-open roles
# is bounded.
max_age_days: 180

# Hard filter: drop listings that don't hit any keyword from your primary stack.
# Useful when search portals return non-engineering roles (marketing, sales, ops) that
# happen to mention some of your keywords in passing.
require_primary_stack_hit: true

# How much credit a listing gets for being one seniority level off (mid↔senior,
# senior↔lead, junior↔mid). 1.0 = full credit (treat adjacent as a fit), 0.5 =
# half credit, 0.0 = adjacent counts the same as a mismatch. Default 1.0 because
# the IT market overcounts "Senior" — being strict here drags down most matches
# for users who are mid-with-experience.
seniority_adjacency_credit: 1.0

# Score multiplier applied to listings whose company name matches one of the
# user's preferred companies (the "Preferred companies" skillset section).
# Multiplicative, capped at 1.0. 1.0 = no boost. Deal-breakers still win:
# a disqualified listing stays at 0 regardless of employer.
preferred_company_boost: 1.25

# Score multiplier applied when a listing's title looks clearly non-engineering
# (Product/Project/Account Manager, Marketing/Sales/Finance roles, Customer
# Success, Recruiter, Data/Business/Fraud Analyst, etc.) — even if the
# description happens to mention engineering keywords. Engineer/Engineering/
# Developer/Architect/SRE/DevOps in the title overrides this. 1.0 = no penalty,
# 0.0 = drop entirely. Default 0.2 = heavy de-rank but keep visible in the
# audit views.
non_engineering_title_multiplier: 0.2

# LLM-based judging layered on top of the keyword ranker. Off by default. When
# enabled, the LlmJudge sends the user's skillset + curated examples (from
# data/<email>/examples/) + the listing title/description to a local language
# model and gets back a 0-1 fit score + brief reason. Final shortlist score is
# `weight * llm_score + (1 - weight) * keyword_score`.
#
# Two providers:
#   llamasharp — in-process via LLamaSharp/llama.cpp. Default. No external
#                service. model_path points at a GGUF file (downloaded on
#                first run). Recommended: Gemma 3 4B Q4_K_M (~2.5 GB).
#   ollama     — HTTP to a user-managed Ollama install at base_url. For
#                power users who already run Ollama; uses model field as the
#                model tag (e.g. "gemma3:4b").
llm:
  enabled: true
  provider: llamasharp
  model: gemma3:4b
  model_path: models/gemma-3-4b-it-q4_k_m.gguf
  # mradermacher's Q4_K_M Gemma 3 4B GGUF — public, no auth, ~2.32 GB.
  # The /api/llm/download-model endpoint streams from this URL to model_path.
  model_download_url: https://huggingface.co/mradermacher/gemma-3-4b-it-GGUF/resolve/main/gemma-3-4b-it.Q4_K_M.gguf
  base_url: http://localhost:11434
  top_n: 50              # judge only the top-N from keyword ranker (0 = all deduped)
  weight: 0.5            # 0.0 = keyword-only, 1.0 = LLM-only
  temperature: 0.0       # deterministic
  context_size: 4096     # llamasharp only
  gpu_layer_count: 0     # llamasharp only — 0 = CPU. Bump for GPU offload.

# Per-tier multipliers applied to the location_remote signal.
#   city    — listing is in your declared city
#   metro   — listing is in one of your declared metro areas
#   country — listing is in your country (but outside city/metro)
#   region  — listing is in your region (e.g. EU/EMEA/Europe synonyms)
#   else    — listing is restricted to a region that excludes you (e.g. "USA only")
location_tier_weights:
  city: 1.0
  metro: 0.85
  country: 0.6
  region: 0.3
  else: 0.1
