name: Build installers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: installers
  cancel-in-progress: true

env:
  VERSION: 0.2.${{ github.run_number }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test
        run: dotnet test src/Jobmatch.slnx -c Release
        env:
          # The runner has no git user.email; give UserContext.Resolve() a value so any
          # test that touches per-user paths resolves instead of throwing.
          JOBFINDER_USER: ci@jobfinder.local

      - name: Publish backend (self-contained win-x64, GUI bundled)
        run: node src/scripts/publish-backend.mjs

      - name: Install desktop dependencies
        run: npm --prefix src/desktop ci

      - name: Set desktop version
        run: npm --prefix src/desktop version ${{ env.VERSION }} --no-git-tag-version --allow-same-version

      - name: Build desktop installer (Electron / NSIS)
        run: npm --prefix src/desktop run dist

      - name: Publish to rolling "latest" prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Jobfinder (latest)
          prerelease: true
          files: src/desktop/release/jobfinder-setup-${{ env.VERSION }}.exe
          body: |
            Automated build from the latest commit on `main`
            (version `${{ env.VERSION }}`, commit ${{ github.sha }}).

            - **Windows** — download `jobfinder-setup-${{ env.VERSION }}.exe` and run it.
              SmartScreen may warn that the publisher is unknown (the installer is
              unsigned) — choose **More info → Run anyway**.
            - **Linux (Debian/Ubuntu)** — download `jobfinder-desktop_${{ env.VERSION }}_amd64.deb`
              and install with `sudo apt install ./jobfinder-desktop_${{ env.VERSION }}_amd64.deb`.

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test
        run: dotnet test src/Jobmatch.slnx -c Release
        env:
          JOBFINDER_USER: ci@jobfinder.local

      - name: Publish backend (self-contained linux-x64, GUI bundled)
        run: node src/scripts/publish-backend.mjs linux-x64

      - name: Install desktop dependencies
        run: npm --prefix src/desktop ci

      - name: Set desktop version
        run: npm --prefix src/desktop version ${{ env.VERSION }} --no-git-tag-version --allow-same-version

      - name: Build desktop installer (Electron / deb)
        run: npm --prefix src/desktop run dist

      - name: Append .deb to "latest" prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          prerelease: true
          files: src/desktop/release/jobfinder-desktop_${{ env.VERSION }}_amd64.deb
